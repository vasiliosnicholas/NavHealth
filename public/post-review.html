<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title class="description">Add a Review for</title>
    <meta name="author" content="Vasilios Nicholas, Aryan Yadav" />
    <meta class="description" name="description" content="Add a review" />
    <link rel="icon" type="./image/x-icon" href="./images/NavHealth.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Basic&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="">
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid justify-content-between">
          <a class="navbar-brand fs-1 basic-regular" href="#">
            Nav<img
              class=""
              src="./images/NavHealth.png"
              alt="NavHealth Logo"
            />Health</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" aria-current="page" href="index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="search.html?admin=true"
                  >Manage Listings</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link active description" href="#"
                  >Add a Review for</a
                >
              </li>
              <li class="nav-item">
                <a class="nav-link" href="#">List Your Business</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main
      class="d-flex flex-column flex-fill justify-content-center align-content-center bg-secondary add-background vh-100"
    >
      <div class="container-fluid w-100 hero-glass rounded-2 h-75">
        <div class="container-fluid bg-white p-5 rounded-2 w-75">
          <form class="container-fluid" role="document">
            <div class="d-flex justify-content-center text-center">
              <h1>Add a Review for</h1>
            </div>
            <hr class="my-2" />
            <div class="d-flex justify-content-between">
              <div class="mb-3">
                <label for="review-title" class="form-label"
                  >Review Title</label
                >
                <input
                  type="text"
                  class="form-control"
                  id="review-title"
                  placeholder="Enter your title"
                />
              </div>
              <div class="mb-3">
                <label for="rating" class="form-label">Rating</label>
                <input
                  type="range"
                  class="form-range"
                  min="0"
                  max="5"
                  id="rating"
                />
              </div>
            </div>

            <div class="mb-3">
              <label for="review-body" class="form-label"
                >Describe your experience</label
              >
              <textarea
                class="form-control"
                id="review-body"
                placeholder="Enter your review"
                rows="3"
              ></textarea>
            </div>
            <hr class="my-2" />
            <div class="d-flex justify-content-between align-content-center">
              <button
                class="btn btn-danger text-center text-md-center"
                type="button"
                onclick="history.back()"
              >
                Cancel
              </button>
              <button
                href="post-review.html"
                type="submit"
                class="btn btn-primary text-center text-md-center"
              >
                Submit Review
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>

    <footer class="container-fluid row bg-body-tertiary pt-3">
      <span class="col">NavHealth</span>
      <span class="col text-end">by Vasilios Nicholas and Aryan Yadav.</span>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      type="module"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./scripts/post-review.js"></script>
  </body>
</html>
