<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NavHealth</title>
    <meta name="author" content="Vasilios Nicholas, Aryan Yadav" />
    <meta name="description" content="Landing Page for NavHealth" />
    <link rel="icon" type="./image/x-icon" href="./images/NavHealth.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Basic&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body class="d-flex flex-column vh-100 mb-auto">
    <header class="mb-auto">
      <h1 class="visually-hidden">NavHealth</h1>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid justify-content-between">
          <a class="navbar-brand fs-1 basic-regular" href="#">
            Nav<img
              class=""
              src="./images/NavHealth.png"
              alt="NavHealth Logo"
            />Health</a
          >
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div
            class="collapse navbar-collapse justify-content-end"
            id="navbarNav"
          >
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="#">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="search.html?admin=true">Manage Listings</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="add-location.html">List Your Business</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>
    <main
      class="d-flex flex-column text-center flex-fill justify-content-center align-items-center add-background"
    >
      <div class="hero-glass">
        <div class="row">
          <h2 class="col basic-regular mb-5 hero-title">
            Connecting you with your healthcare needs.
          </h2>
        </div>
        <!--Search-->
        <div class="row justify-content-center">
          <form class="hero-search-form d-flex" id="search-form" role="search-form">
            <input
              class="form-control"
              type="text"
              list="searchDatalistOptions"
              id="search-bar"
              placeholder="Type to search..."
            />
            <datalist id="searchDatalistOptions">
            </datalist>
            <!--Split-Dropdown-->
            <div class="btn-group">
              <button type="submit" 
              id="submit-search" class="btn btn-primary">Search</button>
              <button
                type="button"
                class="btn btn-primary dropdown-toggle dropdown-toggle-split"
                data-bs-toggle="dropdown"
                aria-haspopup="true"
                aria-expanded="false"
                id="search-dropdown-btn"
              >
                <span id="search-dropdown-btn-name" class="sr-only">by Services</span>
              </button>
              <div id="search-dropdown" class="dropdown-menu">
              </div>
            </div>
          </form>
        </div>
      </div>
    </main>
    <footer class="container-fluid row bg-body-tertiary pt-3">
      <span class="col">NavHealth</span>
      <span class="col text-end">by Vasilios Nicholas and Aryan Yadav.</span>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      type="module"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./scripts/landing.js"></script>
  </body>
</html>
